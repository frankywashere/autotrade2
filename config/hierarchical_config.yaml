# Hierarchical LNN Configuration
# v3.5 - Multi-Task with Online Learning
# All hyperparameters configurable for easy tuning

# ===== ONLINE LEARNING =====
online_learning:
  # Daily update caps (prevents catastrophic forgetting)
  max_updates_per_day:
    fast: 20      # Fast layer: max 20 updates/day
    medium: 5     # Medium layer: max 5 updates/day
    slow: 2       # Slow layer: max 2 updates/day

  # Learning rates for online updates
  learning_rates:
    fast: 0.0001    # Fastest adaptation
    medium: 0.00005 # Conservative
    slow: 0.00001   # Very conservative

  # Error thresholds (legacy - kept for backwards compatibility)
  error_thresholds:
    high: 2.0    # >2% avg error: update all layers
    medium: 1.5  # >1.5% avg error: update fast + medium
    low: 1.0     # >1.0% avg error: update fast only

  # Weighted scoring for update decisions (profit-focused)
  weighted_scoring:
    enabled: true
    no_hit_band_penalty: 3.0          # Never touched predicted band
    no_hit_target_penalty: 2.0        # Didn't work as trade
    overshoot_penalty: 1.5            # Badly misjudged range
    loss_penalty: 2.0                 # Lost money (realized return < -2%)
    high_error_penalty: 1.0           # High MSE error
    # Scoring thresholds
    score_thresholds:
      update_all_layers: 5.0          # Score > 5.0: update all
      update_fast_medium: 3.0         # Score > 3.0: update fast + medium
      update_fast_only: 1.5           # Score > 1.5: update fast

  # Fusion weight adaptation
  fusion_weight_adaptation:
    enabled: true
    adaptation_rate: 0.01             # How quickly to adjust weights
    accuracy_smoothing_alpha: 0.1     # Moving average smoothing

# ===== MULTI-TASK LEARNING =====
loss_weights:
  # Primary tasks (most important)
  high_prediction: 1.0
  low_prediction: 1.0

  # Secondary tasks (profit-focused)
  hit_band: 0.5                       # Will price respect predicted band?
  hit_target: 0.5                     # Will trade work (target before stop)?
  expected_return: 0.3                # Direct return prediction
  overshoot: 0.3                      # How far price overshoots band

# ===== TRADE VALIDATION =====
validation:
  # Band tolerance for hit_band label
  band_tolerance: 0.02                # ±2% around actual high/low

  # Stop loss calculation
  stop_loss_multiplier: 2.0           # 2x ATR below predicted low
  stop_loss_default_pct: 0.02         # Default 2% stop if no ATR

  # Max hold times per layer (minutes)
  max_hold_time:
    fast: 120      # 2 hours
    medium: 480    # 8 hours
    slow: 1440     # 1 day (24 hours)

  # Outcome metric thresholds
  hit_band_threshold: 0.8             # 80% of time in ideal band
  overshoot_threshold: 0.5            # >50% overshoot is significant

# ===== RE-ANCHORING =====
reanchoring:
  enabled: true
  check_interval_days: 7              # Check weekly
  performance_degradation_threshold: 1.2  # 20% worse than baseline
  drift_threshold: 0.15               # L2 drift threshold
  blend_ratio: 0.1                    # 10% original, 90% current
  min_validations: 50                 # Need 50+ validations before re-anchoring

# ===== PREDICTION SCHEDULING =====
prediction_scheduling:
  fast_layer:
    time_interval_minutes: 30
    error_trigger_threshold: 2.0      # Previous error >2% triggers prediction
    volatility_trigger_threshold: 0.05 # >5% volatility triggers
    channel_break_trigger: true       # Predict on channel breaks

  medium_layer:
    time_interval_hours: 2
    fast_error_trigger_threshold: 3.0 # Fast error >3% triggers
    price_movement_trigger_pct: 0.02  # >2% 1h move triggers
    regime_change_trigger: true

  slow_layer:
    time_interval_days: 1
    medium_error_trigger_threshold: 5.0
    major_event_trigger: true         # Earnings, FOMC, etc.

# ===== TRADE TRACKING =====
trade_tracking:
  confidence_threshold: 0.75          # Minimum confidence to log
  log_rationale: true                 # Include full rationale JSON
  track_layer_weights: true           # Log fusion weights
  auto_validate: true                 # Auto-validate when validation_time reached

# ===== FEATURE ENGINEERING =====
features:
  total_features: 467  # v3.7: Multi-threshold ping-pongs + normalized slope + direction flags

  # Binary flags
  binary_flags_enabled: true
  volatility_threshold_multiplier: 1.5  # For is_volatile_now
  channel_min_bars_for_in_channel: 5    # For in_channel flags

  # Channel detection
  channel_lookback: 20
  channel_std_multiplier: 2.0
  ping_pong_tolerance: 0.2            # 20% of channel width

# ===== MODEL ARCHITECTURE =====
model:
  input_size: 467                     # Actual feature count (v3.7)
  hidden_size: 128                    # Output neurons per layer
  internal_neurons_ratio: 2.0         # Total neurons = hidden_size × ratio (e.g., 256 total)
  downsample_fast_to_medium: 5        # 1min → 5min
  downsample_medium_to_slow: 12       # 5min → 1hour

  # Multi-task heads
  multi_task_enabled: true

  # Capacity presets (for interactive selection)
  capacity_presets:
    minimum: 1.5    # 192 total neurons
    standard: 2.0   # 256 total neurons (recommended)
    high: 3.0       # 384 total neurons
    maximum: 4.0    # 512 total neurons

# ===== TRAINING =====
training:
  default_epochs: 100
  default_batch_size: 64
  default_learning_rate: 0.001
  sequence_length: 200                # 200 1-min bars
  prediction_horizon: 24              # 24 minutes ahead
  validation_split: 0.1
  early_stopping_patience: 10
  gradient_clip_norm: 1.0

  # Data
  train_start_year: 2015
  train_end_year: 2022
  test_start_year: 2023

# ===== BACKTESTING =====
backtesting:
  num_simulations: 500
  random_seed: 42
  metrics:
    - mape
    - confidence_calibration
    - sharpe_ratio
    - win_rate
    - avg_return

# ===== SYSTEM =====
system:
  device: auto                        # 'auto', 'cuda', 'mps', or 'cpu'
  num_workers: 4                      # DataLoader workers (auto-adjusted per device)
  pin_memory: true                    # For CUDA only (auto-disabled for MPS/CPU)

  # Device-specific optimizations
  device_settings:
    cuda:
      batch_size: 128
      num_workers: 4
      pin_memory: true
    mps:  # Apple Silicon
      batch_size: 64
      num_workers: 2
      pin_memory: false
    cpu:
      batch_size: 32
      num_workers: 2
      pin_memory: false

# ===== LOGGING =====
logging:
  save_training_history: true
  save_layer_predictions: true
  verbose: true
