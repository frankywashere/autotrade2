name: Telegram Alert Relay

on:
  schedule:
    - cron: '*/2 * * * *'  # Every 2 minutes
  workflow_dispatch: {}     # Manual trigger

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Read Gist, send alerts, clear queue
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          # Fetch gist content to a temp file (too large for shell variables)
          curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" > /tmp/gist_api.json

          # Extract the scanner state JSON to a file
          jq -r '.files["surfer_scanner_state.json"].content // empty' /tmp/gist_api.json > /tmp/state.json

          if [ ! -s /tmp/state.json ]; then
            echo "No scanner state found in gist"
            exit 0
          fi

          # Check for pending alerts
          ALERT_COUNT=$(jq '._pending_telegram | length // 0' /tmp/state.json)
          echo "Pending alerts: $ALERT_COUNT"

          if [ "$ALERT_COUNT" -eq 0 ] || [ "$ALERT_COUNT" = "null" ]; then
            echo "No pending alerts"
            exit 0
          fi

          # Send each alert
          SENT=0
          for i in $(seq 0 $(($ALERT_COUNT - 1))); do
            MSG=$(jq -r "._pending_telegram[$i]" /tmp/state.json)
            echo "Sending alert $((i+1))/$ALERT_COUNT: ${MSG:0:80}..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat "$TG_CHAT_ID" --arg text "$MSG" \
                '{chat_id: $chat, text: $text, parse_mode: "HTML"}')")

            if [ "$HTTP_CODE" = "200" ]; then
              SENT=$((SENT + 1))
              echo "  -> Sent OK"
            else
              echo "  -> Failed (HTTP $HTTP_CODE)"
            fi

            # Rate limit: 1 msg/sec
            sleep 1
          done

          echo "Sent $SENT/$ALERT_COUNT alerts"

          # Clear the pending queue in the gist
          if [ "$SENT" -gt 0 ]; then
            jq '._pending_telegram = []' /tmp/state.json > /tmp/state_cleared.json
            jq -n --rawfile content /tmp/state_cleared.json \
              '{files: {"surfer_scanner_state.json": {content: $content}}}' > /tmp/gist_patch.json

            curl -sf -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/gists/$GIST_ID" \
              -d @/tmp/gist_patch.json > /dev/null

            echo "Cleared pending alerts from gist"
          fi
