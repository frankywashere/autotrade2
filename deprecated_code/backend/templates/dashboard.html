<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTrade2 - ML Trading Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

    <!-- Header -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-400">🎯 AutoTrade2</h1>
                    <span class="ml-4 text-sm text-gray-400">Hierarchical LNN Predictions</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-400" id="last-update">
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Tabs -->
        <div class="mb-6" x-data="{ tab: 'predictions' }">
            <div class="border-b border-gray-700">
                <nav class="-mb-px flex space-x-8">
                    <button
                        @click="tab = 'predictions'"
                        :class="tab === 'predictions' ? 'border-blue-500 text-blue-400' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
                    >
                        📊 Live Predictions
                    </button>
                    <button
                        @click="tab = 'backtest'"
                        :class="tab === 'backtest' ? 'border-blue-500 text-blue-400' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
                    >
                        📈 Backtesting
                    </button>
                    <button
                        @click="tab = 'trades'"
                        :class="tab === 'trades' ? 'border-blue-500 text-blue-400' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
                    >
                        💰 Trades
                    </button>
                    <button
                        @click="tab = 'performance'"
                        :class="tab === 'performance' ? 'border-blue-500 text-blue-400' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
                    >
                        📉 Performance
                    </button>
                </nav>
            </div>

            <!-- Tab Content -->
            <div class="mt-6">

                <!-- Predictions Tab -->
                <div x-show="tab === 'predictions'" x-cloak x-data="{ view: 'setups' }">
                    <!-- View Toggle -->
                    <div class="flex justify-center mb-6">
                        <div class="bg-gray-800 rounded-lg p-1 inline-flex">
                            <button
                                @click="view = 'setups'"
                                :class="view === 'setups' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white'"
                                class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                            >
                                Trade Setups
                            </button>
                            <button
                                @click="view = 'channel'"
                                :class="view === 'channel' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white'"
                                class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                            >
                                Dynamic Horizon
                            </button>
                            <button
                                @click="view = 'fixed'"
                                :class="view === 'fixed' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white'"
                                class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                            >
                                Fixed 24h
                            </button>
                        </div>
                    </div>

                    <!-- Multi-Timeframe Trade Setups View -->
                    <div x-show="view === 'setups'" x-cloak>
                        <div class="flex justify-end mb-2">
                            <button
                                class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-sm font-medium"
                                hx-post="/api/predictions/setups/generate"
                                hx-target="#trade-setups"
                                hx-swap="outerHTML"
                                hx-indicator="#setups-spinner"
                            >
                                <span class="htmx-indicator" id="setups-spinner">Generating...</span>
                                <span class="htmx-not-indicator">Refresh Setups</span>
                            </button>
                        </div>
                        <div id="trade-setups"
                             hx-get="/api/predictions/setups"
                             hx-trigger="load, every 5m"
                             hx-swap="outerHTML">
                            <div class="bg-gray-800 rounded-lg p-6 animate-pulse">
                                <div class="h-8 bg-gray-700 rounded w-1/3 mb-4"></div>
                                <div class="h-32 bg-gray-700 rounded mb-4"></div>
                                <div class="h-32 bg-gray-700 rounded mb-4"></div>
                                <div class="h-32 bg-gray-700 rounded"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Dynamic Horizon View (Channel Projection) -->
                    <div x-show="view === 'channel'" x-cloak>
                        <div class="flex justify-end mb-2">
                            <button
                                class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-sm font-medium"
                                hx-post="/api/predictions/channel/generate"
                                hx-target="#channel-projection"
                                hx-swap="outerHTML"
                                hx-indicator="#channel-spinner"
                            >
                                <span class="htmx-indicator" id="channel-spinner">Generating...</span>
                                <span class="htmx-not-indicator">Generate New</span>
                            </button>
                        </div>
                        <div id="channel-projection"
                             hx-get="/api/predictions/channel"
                             hx-trigger="load, every 5m"
                             hx-swap="outerHTML">
                            <div class="bg-gray-800 rounded-lg p-6 animate-pulse">
                                <div class="h-8 bg-gray-700 rounded w-1/3 mb-4"></div>
                                <div class="h-24 bg-gray-700 rounded mb-4"></div>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="h-20 bg-gray-700 rounded"></div>
                                    <div class="h-20 bg-gray-700 rounded"></div>
                                    <div class="h-20 bg-gray-700 rounded"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Fixed 24h View (Original) -->
                    <div x-show="view === 'fixed'" x-cloak>
                        <div id="prediction-card"
                             hx-get="/api/predictions/latest"
                             hx-trigger="load, every 5m"
                             hx-swap="outerHTML">
                            <div class="bg-gray-800 rounded-lg p-6 animate-pulse">
                                <div class="h-8 bg-gray-700 rounded w-1/4 mb-4"></div>
                                <div class="h-4 bg-gray-700 rounded w-3/4"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Predictions History -->
                    <div class="mt-8">
                        <h3 class="text-lg font-semibold mb-4">Recent Predictions</h3>
                        <div id="predictions-history"
                             hx-get="/api/predictions/history?limit=10"
                             hx-trigger="load"
                             hx-swap="innerHTML">
                            <div class="text-gray-400">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Backtest Tab -->
                <div x-show="tab === 'backtest'" x-cloak>
                    <div class="bg-gray-800 rounded-lg p-6">
                        <h2 class="text-xl font-semibold mb-4">Run Backtest Simulation</h2>

                        <form hx-post="/api/backtests/simulate"
                              hx-target="#backtest-results"
                              hx-swap="innerHTML"
                              class="space-y-4">

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">Start Date</label>
                                    <input type="date" name="start_date" value="2025-11-01"
                                           class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">End Date</label>
                                    <input type="date" name="end_date" value="2025-11-30"
                                           class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Confidence Threshold</label>
                                <input type="range" name="confidence_threshold" min="0.5" max="0.95" step="0.05" value="0.7"
                                       class="w-full"
                                       oninput="this.nextElementSibling.textContent = (this.value * 100).toFixed(0) + '%'">
                                <span class="text-sm text-gray-400">70%</span>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Layer</label>
                                <select name="layer" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg">
                                    <option value="">Fusion (default)</option>
                                    <option value="15min">15 Minute</option>
                                    <option value="1hour">1 Hour</option>
                                    <option value="4hour">4 Hour</option>
                                    <option value="daily">Daily</option>
                                </select>
                            </div>

                            <button type="submit"
                                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium">
                                Run Backtest
                            </button>
                        </form>

                        <div id="backtest-results" class="mt-6">
                            <!-- Results will appear here -->
                        </div>
                    </div>
                </div>

                <!-- Trades Tab -->
                <div x-show="tab === 'trades'" x-cloak>
                    <!-- Trade Entry Form -->
                    <div class="bg-gray-800 rounded-lg p-6 mb-6">
                        <h2 class="text-xl font-semibold mb-4">Log New Trade</h2>

                        <div id="trade-message"></div>

                        <form hx-post="/api/trades"
                              hx-target="#trade-message"
                              hx-swap="innerHTML"
                              class="space-y-4">

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">Entry Time</label>
                                    <input type="datetime-local" name="entry_time"
                                           class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg"
                                           required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">Entry Price ($)</label>
                                    <input type="number" name="entry_price" step="0.01"
                                           class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg"
                                           placeholder="242.50"
                                           required>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Quantity</label>
                                <input type="number" name="quantity" value="1"
                                       class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg"
                                       required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Notes (optional)</label>
                                <textarea name="notes" rows="2"
                                          class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg"
                                          placeholder="Trade rationale..."></textarea>
                            </div>

                            <button type="submit"
                                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium">
                                📝 Log Trade Entry
                            </button>
                        </form>
                    </div>

                    <!-- Trade History -->
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Trade History</h3>
                        <div id="trades-list"
                             hx-get="/api/trades"
                             hx-trigger="load"
                             hx-swap="innerHTML">
                            <div class="text-gray-400">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Performance Tab -->
                <div x-show="tab === 'performance'" x-cloak>
                    <!-- Performance Metrics -->
                    <div class="mb-6">
                        <h2 class="text-xl font-semibold mb-4">Performance Metrics</h2>
                        <div id="performance-metrics"
                             hx-get="/api/trades/performance"
                             hx-trigger="load, every 30s"
                             hx-swap="innerHTML">
                            <div class="text-gray-400">Loading...</div>
                        </div>
                    </div>

                    <!-- P&L Chart -->
                    <div class="bg-gray-800 rounded-lg p-6 mb-6">
                        <h3 class="text-lg font-semibold mb-4">Cumulative P&L Over Time</h3>
                        <div id="pnl-chart"></div>
                    </div>

                    <!-- Returns Distribution -->
                    <div class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-semibold mb-4">Returns Distribution</h3>
                        <div id="returns-chart"></div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // =================================================================
        // WebSocket Connection for Real-Time Updates
        // =================================================================
        let ws = null;
        let wsReconnectTimer = null;
        const wsStatusEl = document.getElementById('last-update');

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/predictions`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                wsStatusEl.innerHTML = '<span class="text-green-400">● Live</span> ' + new Date().toLocaleTimeString();
                if (wsReconnectTimer) {
                    clearTimeout(wsReconnectTimer);
                    wsReconnectTimer = null;
                }
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);

                if (message.type === 'prediction_update') {
                    console.log('New prediction received:', message.data);
                    wsStatusEl.innerHTML = '<span class="text-green-400">● Live</span> Updated: ' + new Date().toLocaleTimeString();

                    // Trigger HTMX refresh on prediction containers
                    // This reloads the prediction data from the API
                    htmx.trigger('#trade-setups-container', 'refresh');
                    htmx.trigger('#channel-container', 'refresh');
                    htmx.trigger('#prediction-container', 'refresh');

                    // Show toast notification
                    showToast('New prediction available!');
                } else if (message.type === 'ping') {
                    // Respond to keep-alive
                    ws.send('pong');
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                wsStatusEl.innerHTML = '<span class="text-yellow-400">○ Reconnecting...</span>';

                // Reconnect after 5 seconds
                wsReconnectTimer = setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                wsStatusEl.innerHTML = '<span class="text-red-400">○ Error</span>';
            };
        }

        // Toast notification for updates
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg z-50 animate-pulse';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialize WebSocket on page load
        document.addEventListener('DOMContentLoaded', connectWebSocket);

        // =================================================================
        // Existing Functionality
        // =================================================================

        // Update timestamp
        function updateTimestamp() {
            // Only update if WebSocket isn't managing status
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                document.getElementById('last-update').textContent =
                    'Last update: ' + new Date().toLocaleTimeString();
            }
        }
        updateTimestamp();
        setInterval(updateTimestamp, 60000); // Update every minute

        // Load P&L chart
        async function loadPnlChart() {
            try {
                const response = await fetch('/api/charts/pnl-over-time');
                const chartData = await response.json();
                Plotly.newPlot('pnl-chart', chartData.data, chartData.layout, {
                    responsive: true,
                    displayModeBar: false
                });
            } catch (error) {
                document.getElementById('pnl-chart').innerHTML =
                    '<p class="text-gray-400">No trades yet. Log your first trade to see this chart!</p>';
            }
        }

        // Load returns distribution chart
        async function loadReturnsChart() {
            try {
                const response = await fetch('/api/charts/returns-distribution');
                const chartData = await response.json();
                Plotly.newPlot('returns-chart', chartData.data, chartData.layout, {
                    responsive: true,
                    displayModeBar: false
                });
            } catch (error) {
                document.getElementById('returns-chart').innerHTML =
                    '<p class="text-gray-400">No trades yet. Log your first trade to see this chart!</p>';
            }
        }

        // Load charts when performance tab is shown
        document.addEventListener('DOMContentLoaded', function() {
            // Initial load
            setTimeout(() => {
                loadPnlChart();
                loadReturnsChart();
            }, 1000);

            // Reload every 30 seconds
            setInterval(() => {
                loadPnlChart();
                loadReturnsChart();
            }, 30000);
        });
    </script>

</body>
</html>
